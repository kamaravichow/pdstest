name: Build Linux

on:
  push:
    tags:
      - 'v*'          # Build and publish a release when a version tag is pushed
    branches:
      - main          # Build (artifact only) on pushes to main
  workflow_dispatch:   # Allow manual runs from the Actions tab

permissions:
  contents: write      # Needed to create/update releases and upload assets

env:
  APP_NAME: pdstest

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm   # Native ARM64 runner (no cross-compiling)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      # subosito/flutter-action can't resolve a prebuilt arm64 Linux SDK from the
      # stable release manifest, so clone Flutter from git instead. This works on
      # both x64 and arm64: the toolchain bootstraps the engine on first run.
      - name: Set up Flutter
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Show versions
        run: |
          flutter --version
          flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package bundle
        id: package
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          ARTIFACT_NAME="${APP_NAME}-linux-${ARCH}"
          # The bundle path is named after the host CPU arch (x64 / arm64).
          BUNDLE_DIR="$(find build/linux -maxdepth 3 -type d -name bundle | head -n1)"
          if [ -z "$BUNDLE_DIR" ]; then
            echo "::error::could not locate the built Linux bundle"; exit 1
          fi
          TARBALL="${ARTIFACT_NAME}.tar.gz"
          # Archive the whole bundle (executable + data/ + lib/), not just the binary,
          # because a Flutter Linux app needs its bundled libs and assets to run.
          tar -czf "$TARBALL" -C "$BUNDLE_DIR" .
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          ls -lh "$TARBALL"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.tarball }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.tarball }}
          generate_release_notes: true
